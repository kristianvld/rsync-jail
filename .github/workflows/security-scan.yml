name: Security Scan

on:
  workflow_dispatch:
  schedule:
    # Re-scan the published image daily even if no new image was pushed.
    - cron: "0 8 * * *"

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  vulnerability-scan:
    name: Scan published image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read # pull the published image from GHCR
      security-events: write # upload Trivy SARIF to code scanning
      issues: write # open/update the vulnerability tracking issue

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        run: |
          set -euo pipefail
          docker pull "${REGISTRY}/${IMAGE_NAME}:latest"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          scanners: vuln
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Run Trivy vulnerability scanner (table output)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
          exit-code: "0"

      - name: Check for high or critical vulnerabilities
        id: vulnerability-check
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          scanners: vuln
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Generate security summary
        env:
          VULNERABILITIES_FOUND: ${{ steps.vulnerability-check.outcome == 'failure' }}
        run: |
          set -euo pipefail

          {
            echo "## Security Scan Results"
            echo
            echo "**Image:** \`${REGISTRY}/${IMAGE_NAME}:latest\`"
            echo

            if [ "${VULNERABILITIES_FOUND}" = "true" ]; then
              echo "**High or critical vulnerabilities detected.** Check the Security tab for details."
            else
              echo "**No high or critical vulnerabilities found.**"
            fi

            echo
            echo "Detailed vulnerability report is available in the Security tab."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update issue for high or critical vulnerabilities
        if: steps.vulnerability-check.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        with:
          script: |
            const { owner, repo } = context.repo;
            const image = process.env.IMAGE_REF;
            const title = 'High or Critical Security Vulnerabilities Detected';
            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            const labels = [
              { name: 'security', color: 'd73a4a' },
              { name: 'vulnerability', color: 'd73a4a' },
              { name: 'high', color: 'fbca04' },
              { name: 'critical', color: 'b60205' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({ owner, repo, ...label });
              } catch (error) {
                if (error.status !== 422) throw error;
              }
            }

            const body = `
            ## High or Critical Security Vulnerabilities Detected

            The automated security scan detected high or critical vulnerabilities in the latest container image.

            **Image:** \`${image}\`
            **Scan Date:** ${new Date().toISOString().split('T')[0]}
            **Workflow Run:** ${runUrl}

            ### Action Required

            Review the vulnerabilities in the [Security tab](${context.payload.repository.html_url}/security/code-scanning) and update the base image or packages as needed.

            This issue was automatically created by the security scan workflow.
            `;

            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const existingIssue = issues.data.find(issue => issue.title === title);
            if (existingIssue) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existingIssue.number,
                body
              });
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body: `High or critical vulnerabilities are still present in \`${image}\`.\n\nWorkflow run: ${runUrl}`
              });
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: labels.map(label => label.name)
            });

      - name: Fail on high or critical vulnerabilities
        if: steps.vulnerability-check.outcome == 'failure'
        run: exit 1
